version: "3.9"

services:
  redis-master:
    image: redis:7-alpine
    container_name: oqul-redis-master
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 10

  redis-replica:
    image: redis:7-alpine
    container_name: oqul-redis-replica
    ports:
      - "6380:6379"
    command: ["redis-server", "--replicaof", "redis-master", "6379", "--appendonly", "yes"]
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel:
    image: redis:7-alpine
    container_name: oqul-redis-sentinel
    ports:
      - "26379:26379"
    volumes:
      - ./sentinel.conf:/etc/redis/sentinel.conf:ro
    command: ["redis-sentinel", "/etc/redis/sentinel.conf"]
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica:
        condition: service_started

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: oqul-failover-redis-exporter
    environment:
      REDIS_ADDR: redis://redis-master:6379
    ports:
      - "9121:9121"
    depends_on:
      redis-master:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: oqul-failover-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: oqul-failover-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
