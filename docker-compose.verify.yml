services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: oqul
      POSTGRES_PASSWORD: oqul
      POSTGRES_DB: oqul_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oqul -d oqul_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://oqul:oqul@postgres:5432/oqul_test
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: local-auth-secret-change-me
      DELIVERY_RECEIPT_SECRET: local-delivery-secret
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
