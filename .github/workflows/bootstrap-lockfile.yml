name: Bootstrap package-lock

on:
  workflow_dispatch:

jobs:
  bootstrap-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Generate package-lock
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm ci

      - name: Create lockfile pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: add deterministic package-lock"
          title: "chore: add deterministic package-lock"
          body: |
            Generated package-lock.json using npm install + npm ci on a clean GitHub runner.
          branch: chore/add-package-lock
          add-paths: |
            package-lock.json
